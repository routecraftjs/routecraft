name: Registry CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "capabilities/**"
      - "agents/**"
      - "skills/**"
      - "examples/**"

jobs:
  validate-and-hash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install yaml parser
        run: pnpm add -g yaml

      - name: Fetch main registry for immutability check
        run: |
          git fetch origin main
          mkdir -p /tmp/main-registry
          git show origin/main:registry/capabilities.json > /tmp/main-registry/capabilities.json 2>/dev/null || echo '{}' > /tmp/main-registry/capabilities.json
          git show origin/main:registry/agents.json > /tmp/main-registry/agents.json 2>/dev/null || echo '{}' > /tmp/main-registry/agents.json
          git show origin/main:registry/skills.json > /tmp/main-registry/skills.json 2>/dev/null || echo '{}' > /tmp/main-registry/skills.json
          git show origin/main:registry/examples.json > /tmp/main-registry/examples.json 2>/dev/null || echo '{}' > /tmp/main-registry/examples.json

      - name: Find changed craft.yml files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'capabilities/**/craft.yml' 'agents/**/craft.yml' 'skills/**/craft.yml' 'examples/**/craft.yml' | tr '\n' ' ')
          echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "No craft.yml files changed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Changed manifests: ${CHANGED}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate craft.yml schema
        if: steps.changed.outputs.skip != 'true'
        run: node scripts/validate-manifest.js ${{ steps.changed.outputs.files }}

      - name: Check capability files exist
        if: steps.changed.outputs.skip != 'true'
        run: |
          set -e
          for manifest in ${{ steps.changed.outputs.files }}; do
            dir=$(dirname "$manifest")
            id=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.id)")
            type=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.type)")

            # Examples don't require a capability file
            if [ "$type" = "example" ]; then
              continue
            fi

            found=false
            for ext in .mjs .ts .js; do
              if [ -f "${dir}/${id}${ext}" ]; then
                found=true
                break
              fi
            done

            if [ "$found" = "false" ]; then
              echo "✗  Capability file not found for ${manifest}. Expected ${dir}/${id}.mjs, ${dir}/${id}.ts, or ${dir}/${id}.js"
              exit 1
            fi
            echo "✓  Found capability file for ${id}"
          done

      - name: Immutability check
        if: steps.changed.outputs.skip != 'true'
        run: |
          set -e
          for manifest in ${{ steps.changed.outputs.files }}; do
            id=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.id)")
            version=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.version)")
            type=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.type)")

            # Examples are not immutable
            if [ "$type" = "example" ]; then
              echo "⊘  ${id}@${version}: examples are mutable, skipping immutability check"
              continue
            fi

            # Determine registry file
            if [ "$type" = "capability" ]; then
              reg_file="/tmp/main-registry/capabilities.json"
            elif [ "$type" = "agent" ]; then
              reg_file="/tmp/main-registry/agents.json"
            elif [ "$type" = "skill" ]; then
              reg_file="/tmp/main-registry/skills.json"
            fi

            echo "Checking immutability: ${id}@${version}"

            # Check if version exists in main registry
            existing_sha=$(node -e "
              import {readFileSync} from 'fs';
              try {
                const reg = JSON.parse(readFileSync('${reg_file}', 'utf-8'));
                const sha = reg?.['${id}']?.versions?.['${version}']?.sha256;
                console.log(sha || '');
              } catch { console.log(''); }
            ")

            if [ -n "$existing_sha" ]; then
              # Version exists - compute incoming SHA and compare
              dir=$(dirname "$manifest")
              incoming_sha=""
              for ext in .mjs .ts .js; do
                if [ -f "${dir}/${id}${ext}" ]; then
                  incoming_sha=$(sha256sum "${dir}/${id}${ext}" | cut -d' ' -f1)
                  break
                fi
              done

              if [ "$existing_sha" != "$incoming_sha" ]; then
                echo ""
                echo "✗  Version ${id}@${version} already exists in the registry with a different SHA."
                echo "   Found in main registry: sha256 = ${existing_sha}"
                echo "   Incoming file:          sha256 = ${incoming_sha}"
                echo ""
                echo "   Versions are immutable once merged. You cannot modify a published version."
                echo "   To ship a change, submit a new version (e.g. $(echo $version | sed 's/\.[0-9]*$/./' | tr -d '\n')$((${version##*.} + 1))) in a separate directory."
                exit 1
              else
                echo "✓  ${id}@${version}: SHA matches main registry (no change)"
              fi
            else
              echo "✓  ${id}@${version}: new version, no immutability conflict"
            fi
          done

      - name: Static analysis
        if: steps.changed.outputs.skip != 'true'
        run: |
          set -e
          for manifest in ${{ steps.changed.outputs.files }}; do
            dir=$(dirname "$manifest")
            id=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.id)")
            type=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log(m.type)")
            env_vars=$(node -e "import {readFileSync} from 'fs'; import {parse} from 'yaml'; const m = parse(readFileSync('$manifest','utf-8')); console.log((m.env || []).join(','))")

            # Skip examples
            if [ "$type" = "example" ]; then
              continue
            fi

            cap_file=""
            for ext in .mjs .ts .js; do
              if [ -f "${dir}/${id}${ext}" ]; then
                cap_file="${dir}/${id}${ext}"
                break
              fi
            done

            if [ -n "$cap_file" ]; then
              node scripts/scan-static.js "$cap_file" --env "$env_vars"
            fi
          done

      - name: Compute SHA-256 and update registry JSON
        if: steps.changed.outputs.skip != 'true'
        id: meta
        run: node scripts/compute-sha.js ${{ steps.changed.outputs.files }}

      - name: Commit registry JSON to PR branch
        if: steps.changed.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: computed sha for registry entries"
          file_pattern: registry/*.json
