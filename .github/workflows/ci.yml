name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"

permissions:
  contents: read

concurrency:
  # Include event_name so the new pull_request-triggered run doesn't collide
  # with main's still-live pull_request_target workflow during the transition.
  # After this PR merges, only pull_request fires, so the event_name segment
  # becomes a no-op and concurrency works as before.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'examples/**'
              - 'bun.lock'
              - 'tsconfig*.json'
              - '.github/workflows/**'
              - '.github/scripts/**'
              - '.changeset/**'

      # release.yml runs on workflow_run, where the push's `before` sha is not
      # in the event payload; hand it over as an artifact so the canary job
      # can diff the exact range of the push.
      - name: Record push base for the release workflow
        if: github.event_name == 'push'
        env:
          BEFORE: ${{ github.event.before }}
        run: echo "$BEFORE" > push-base.txt

      - name: Upload push base
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: push-base
          path: push-base.txt
          retention-days: 1

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

  validate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Run checks
        run: |
          bun run format
          bun run typecheck
          bun run lint
          bunx madge --circular .

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Run tests
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Build packages
        run: bun run build
        env:
          # PostHog keys are NEXT_PUBLIC_* so technically safe to expose, but
          # the PR build artifact is thrown away. Only inject on trusted triggers.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ github.event_name != 'pull_request' && secrets.NEXT_PUBLIC_POSTHOG_KEY || '' }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ github.event_name != 'pull_request' && secrets.NEXT_PUBLIC_POSTHOG_HOST || '' }}

      - name: Check bundle size
        run: bun run limit:size

      # Artifacts, not actions/cache: the cache service is eventually
      # consistent, so a same-run consumer job can miss a key saved seconds
      # earlier (observed: smoke jobs packing an empty dist). Artifacts are
      # guaranteed within the run that produced them.
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist
          path: |
            packages/*/dist
            examples/dist
          if-no-files-found: error
          retention-days: 1

  scaffolder-smoke:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    name: scaffolder-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist

      - name: Run scaffolder integration tests (bun)
        env:
          TEST_PACKAGE_MANAGER: bun
        run: bun run test:integration

      - name: Run scaffolder integration tests (npm, install + typecheck only)
        env:
          TEST_PACKAGE_MANAGER: npm
        run: bun run test:integration

  embedding-smoke:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    name: embedding-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # No bun and no workspace node_modules: the smoke deliberately uses only
      # node + npm so it matches a real Node user embedding the tarball.
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist

      - name: Smoke test Node embedding (pack + npm install + node runner.ts)
        run: node .github/scripts/smoke-test-embedding.mjs

  adapter-cross-runtime:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
    name: adapter-cross-runtime (${{ matrix.runtime }})
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # Installed in both matrix legs: the dependency-install fallback below
      # needs bun even on the node leg. The node tests themselves still run
      # under plain node via npm.
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist

      - name: Run cross-runtime adapter tests (bun)
        if: matrix.runtime == 'bun'
        run: bun run test:cross-runtime

      - name: Run cross-runtime adapter tests (node)
        if: matrix.runtime == 'node'
        run: npm run test:cross-runtime:node
