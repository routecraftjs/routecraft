name: CI

on:
  workflow_dispatch:
    inputs:
      docs_version:
        description: "Version label for a manual docs deploy. Leave blank to use the dispatched ref's apps/routecraft.dev/package.json version."
        required: false
        type: string
  push:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"
  release:
    types: [created]

permissions:
  contents: read

concurrency:
  # Include event_name so the new pull_request-triggered run doesn't collide
  # with main's still-live pull_request_target workflow during the transition.
  # After this PR merges, only pull_request fires, so the event_name segment
  # becomes a no-op and concurrency works as before.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'examples/**'
              - 'bun.lock'
              - 'tsconfig*.json'
              - '.github/workflows/**'
              - '.github/scripts/**'

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

  validate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Run checks
        run: |
          bun run format
          bun run typecheck
          bun run lint
          bunx madge --circular .

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Run tests
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Build packages
        run: bun run build
        env:
          # PostHog keys are NEXT_PUBLIC_* so technically safe to expose, but
          # the PR build artifact is thrown away. Only inject on trusted triggers.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ github.event_name != 'pull_request' && secrets.NEXT_PUBLIC_POSTHOG_KEY || '' }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ github.event_name != 'pull_request' && secrets.NEXT_PUBLIC_POSTHOG_HOST || '' }}

      - name: Check bundle size
        run: bun run limit:size

      - name: Cache build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

  scaffolder-smoke:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'release'
    runs-on: ubuntu-latest
    name: scaffolder-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set version for smoke test
        run: |
          VERSION=$(node -p "require('./packages/routecraft/package.json').version")
          bun run version:set "$VERSION"

      - name: Run scaffolder integration tests (bun)
        env:
          TEST_PACKAGE_MANAGER: bun
        run: bun run test:integration

      - name: Run scaffolder integration tests (npm, install + typecheck only)
        env:
          TEST_PACKAGE_MANAGER: npm
        run: bun run test:integration

      - name: Restore repo (only paths set-version touched)
        run: |
          git checkout -- package.json examples/package.json \
            packages/ai/package.json packages/browser/package.json packages/cli/package.json \
            packages/create-routecraft/package.json packages/eslint-plugin-routecraft/package.json packages/os/package.json packages/routecraft/package.json packages/testing/package.json \
            packages/cli/src/index.ts \
            apps/routecraft.dev/package.json

  embedding-smoke:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'release'
    runs-on: ubuntu-latest
    name: embedding-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set version for smoke test
        run: |
          VERSION=$(node -p "require('./packages/routecraft/package.json').version")
          bun run version:set "$VERSION"

      - name: Smoke test Node embedding (pack + npm install + node runner.ts)
        run: node .github/scripts/smoke-test-embedding.mjs

      - name: Restore repo (only paths set-version touched)
        run: |
          git checkout -- package.json examples/package.json \
            packages/ai/package.json packages/browser/package.json packages/cli/package.json \
            packages/create-routecraft/package.json packages/eslint-plugin-routecraft/package.json packages/os/package.json packages/routecraft/package.json packages/testing/package.json \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            packages/cli/src/index.ts \
            apps/routecraft.dev/package.json

  adapter-cross-runtime:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
    name: adapter-cross-runtime (${{ matrix.runtime }})
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run cross-runtime adapter tests (bun)
        if: matrix.runtime == 'bun'
        run: bun run test:cross-runtime

      - name: Run cross-runtime adapter tests (node)
        if: matrix.runtime == 'node'
        run: npm run test:cross-runtime:node

  publish-canary:
    needs:
      [changes, build, scaffolder-smoke, embedding-smoke, adapter-cross-runtime]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-canary-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Determine canary version
        id: canary_version
        run: |
          set -eo pipefail

          BASE_VERSION=$(node -p "require('./packages/routecraft/package.json').version")
          echo "Base version: $BASE_VERSION"

          # Query npm for the highest canary build number for this base version
          LATEST_CANARY=$(npm view @routecraft/routecraft versions --json 2>/dev/null | \
            jq -r ".[] | select(startswith(\"${BASE_VERSION}-canary.\"))" | \
            sed -n "s/^${BASE_VERSION}-canary\.\([0-9]*\)$/\1/p" | \
            sort -nr | head -n1)

          if [[ -n "$LATEST_CANARY" ]]; then
            BUILD_NUMBER=$((LATEST_CANARY + 1))
            echo "Latest canary build: $LATEST_CANARY, next: $BUILD_NUMBER"
          else
            BUILD_NUMBER=1
            echo "No canary found for $BASE_VERSION, starting at 1"
          fi

          CANARY_VERSION="${BASE_VERSION}-canary.${BUILD_NUMBER}"
          echo "Computed canary version: $CANARY_VERSION"

          {
            echo "canary_version=$CANARY_VERSION"
            echo "base_version=$BASE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Update package versions
        run: bun run version:set "${{ steps.canary_version.outputs.canary_version }}"

      - name: Publish canary to npm
        run: |
          for pkg in packages/routecraft packages/cli packages/create-routecraft packages/eslint-plugin-routecraft packages/ai packages/browser packages/testing; do
            echo "Publishing $pkg..."
            npm publish "./$pkg" --tag canary --access public --provenance
          done

  publish:
    needs: [build, scaffolder-smoke, embedding-smoke, adapter-cross-runtime]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate release name matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"
          if [ "$TAG" != "$NAME" ]; then
            echo "::error::Release name ('$NAME') does not match tag ('$TAG'). They must be identical."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Update package versions
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/tags/v}
          bun run version:set "$RELEASE_VERSION"

      - name: Check package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Package version ($PKG_VERSION) does not match release version ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Publish packages to npm
        run: |
          for pkg in packages/routecraft packages/cli packages/create-routecraft packages/eslint-plugin-routecraft packages/ai packages/browser packages/testing; do
            echo "Publishing $pkg..."
            npm publish "./$pkg" --access public --provenance
          done

  build-and-deploy-docs:
    needs:
      [
        validate,
        test,
        build,
        scaffolder-smoke,
        embedding-smoke,
        adapter-cross-runtime,
      ]
    # `always()` keeps the deploy reachable when smoke jobs skip themselves
    # (workflow_dispatch with no package changes). The `!contains(...)` checks
    # still block deploy if any integration job that actually ran failed or
    # was cancelled.
    if: |
      always()
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
      && (
        github.event_name == 'workflow_dispatch'
        || github.event_name == 'release'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve docs version label
        id: docver
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.docs_version }}
        run: |
          set -eo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            LABEL="$REF_NAME"
          elif [ -n "$INPUT_VERSION" ]; then
            LABEL="$INPUT_VERSION"
          else
            LABEL="v$(jq -r .version apps/routecraft.dev/package.json)"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Docs version label: $LABEL"

      - name: Build docs
        env:
          NEXT_PUBLIC_DOC_VERSION: ${{ steps.docver.outputs.label }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
        run: bun run --filter routecraft.dev build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/routecraft.dev/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
