name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"

permissions:
  contents: read

concurrency:
  # Include event_name so the new pull_request-triggered run doesn't collide
  # with main's still-live pull_request_target workflow during the transition.
  # After this PR merges, only pull_request fires, so the event_name segment
  # becomes a no-op and concurrency works as before.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'examples/**'
              - 'bun.lock'
              - 'tsconfig*.json'
              - '.github/workflows/**'
              - '.github/scripts/**'
              - '.changeset/**'

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

  validate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Run checks
        run: |
          bun run format
          bun run typecheck
          bun run lint
          bunx madge --circular .

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Run tests
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Build packages
        run: bun run build
        env:
          # PostHog keys are NEXT_PUBLIC_* so technically safe to expose, but
          # the PR build artifact is thrown away. Only inject on trusted triggers.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ github.event_name != 'pull_request' && secrets.NEXT_PUBLIC_POSTHOG_KEY || '' }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ github.event_name != 'pull_request' && secrets.NEXT_PUBLIC_POSTHOG_HOST || '' }}

      - name: Check bundle size
        run: bun run limit:size

      # Artifacts, not actions/cache: the cache service is eventually
      # consistent, so a same-run consumer job can miss a key saved seconds
      # earlier (observed: smoke jobs packing an empty dist). Artifacts are
      # guaranteed within the run that produced them.
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist
          path: |
            packages/*/dist
            examples/dist
          if-no-files-found: error
          retention-days: 1

  scaffolder-smoke:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    name: scaffolder-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist

      - name: Run scaffolder integration tests (bun)
        env:
          TEST_PACKAGE_MANAGER: bun
        run: bun run test:integration

      - name: Run scaffolder integration tests (npm, install + typecheck only)
        env:
          TEST_PACKAGE_MANAGER: npm
        run: bun run test:integration

  embedding-smoke:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    name: embedding-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # No bun and no workspace node_modules: the smoke deliberately uses only
      # node + npm so it matches a real Node user embedding the tarball.
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist

      - name: Smoke test Node embedding (pack + npm install + node runner.ts)
        run: node .github/scripts/smoke-test-embedding.mjs

  adapter-cross-runtime:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
    name: adapter-cross-runtime (${{ matrix.runtime }})
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # Installed in both matrix legs: the dependency-install fallback below
      # needs bun even on the node leg. The node tests themselves still run
      # under plain node via npm.
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist

      - name: Run cross-runtime adapter tests (bun)
        if: matrix.runtime == 'bun'
        run: bun run test:cross-runtime

      - name: Run cross-runtime adapter tests (node)
        if: matrix.runtime == 'node'
        run: npm run test:cross-runtime:node

  # Snapshot canaries: published from main only while changesets are pending,
  # versioned like 0.6.0-canary-<timestamp>. Real releases happen in
  # release.yml via the changesets action.
  publish-snapshot:
    needs:
      [changes, build, scaffolder-smoke, embedding-smoke, adapter-cross-runtime]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-snapshot-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history: the snapshot step diffs against the pre-push commit
          # (github.event.before) to find which packages changed.
          fetch-depth: 0

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      # The node_modules cache is best-effort; reinstall on a miss instead of
      # failing later with a confusing missing-binary error. No dist download
      # here: the publish step rebuilds after versioning anyway.
      - name: Install dependencies on cache miss
        run: |
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi

      # Every main push ships a fresh canary of the packages CHANGED by that
      # push (no changeset required: a synthetic one is generated from the
      # git diff). The fixed core train moves together whenever any train
      # member changed; independent packages (ai, browser) only get a canary
      # when they themselves changed, versioned from their OWN version line
      # via snapshot.useCalculatedVersion (e.g. 0.6.1-canary-<datetime>).
      - name: Create snapshot changeset for changed packages
        id: snapshot
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -eo pipefail
          BASE="$BEFORE"
          if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE="$(git rev-parse HEAD~1)"
          fi
          CHANGED_DIRS=$(git diff --name-only "$BASE" HEAD -- packages/ | cut -d/ -f2 | sort -u)
          mkdir -p .changeset
          {
            echo '---'
            for d in $CHANGED_DIRS; do
              f="packages/$d/package.json"
              [ -f "$f" ] || continue
              node -e "const p=require('./$f'); if (!p.private) console.log('\"' + p.name + '\": patch')"
            done
            echo '---'
            echo ''
            echo 'Canary snapshot of the packages changed in this push.'
          } > .changeset/snapshot-canary.md
          cat .changeset/snapshot-canary.md
          if grep -q '": patch' .changeset/snapshot-canary.md; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            rm .changeset/snapshot-canary.md
            echo "No public package changed; skipping canary."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version snapshot
        if: steps.snapshot.outputs.publish == 'true'
        run: bunx changeset version --snapshot canary

      # Tokenless npm auth: Trusted Publishing (OIDC) is configured on
      # npmjs.com per package, pinned to this repo + this workflow file.
      - name: Publish snapshot to npm
        if: steps.snapshot.outputs.publish == 'true'
        run: |
          bun run build
          bunx changeset publish --tag canary --no-git-tag

  build-and-deploy-docs:
    needs:
      [
        validate,
        test,
        build,
        scaffolder-smoke,
        embedding-smoke,
        adapter-cross-runtime,
      ]
    # `always()` keeps the deploy reachable when smoke jobs skip themselves
    # (workflow_dispatch with no package changes). The `!contains(...)` checks
    # still block deploy if any integration job that actually ran failed or
    # was cancelled. Deploys only run from main, manual dispatches included:
    # a dispatch on a feature branch must not rebuild the published site from
    # that branch's content and reachable tags.
    if: |
      always()
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
      && github.ref == 'refs/heads/main'
      && (
        github.event_name == 'workflow_dispatch'
        || github.event_name == 'push'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history + tags so the freeze step below can read docs content
          # from the latest release tag.
          fetch-depth: 0

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The published docs (/docs and /cheat-sheet) track the last released
      # version, never the in-development code on main. On a main push or a
      # manual run we overlay the docs and cheat-sheet content from the latest
      # release tag (pushed by release.yml after a changesets publish), leaving
      # the rest of the site (home, blog, changelog) on the main-branch
      # cadence. This is what lets a blog post or a home-page typo ship without
      # cutting a release, without leaking unreleased docs. release.yml
      # re-dispatches this workflow after pushing a fresh v* tag so the deploy
      # that raced the tag gets replaced.
      #
      # Releases at or before MIN_FREEZE_VERSION predate the current docs styling
      # and do not render with the present shell, so they are never frozen or
      # published. Until a newer release exists, /docs publishes from the main
      # working tree (labelled with the in-development version).
      - name: Resolve docs release ref
        id: docver
        run: |
          set -eo pipefail
          git fetch --tags --force origin >/dev/null 2>&1 || true

          # Exclusive lower bound: only releases strictly newer than this render
          # with the current docs shell and are eligible to be frozen/published.
          MIN_FREEZE_VERSION="v0.5.0"

          # 0 (true) when $1 is strictly greater than $2 under version sort.
          version_gt() {
            [ "$1" != "$2" ] &&
              [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n1)" = "$1" ]
          }

          # Only tags reachable from the checked-out ref: a v* tag on an
          # abandoned branch must never freeze the published docs.
          LATEST_TAG="$(git tag --merged HEAD -l 'v*' | sort -V | tail -n1)"
          if [ -n "$LATEST_TAG" ] && version_gt "$LATEST_TAG" "$MIN_FREEZE_VERSION"; then
            LABEL="$LATEST_TAG"
            FREEZE_TAG="$LATEST_TAG"
          else
            # No eligible release yet: publish the working-tree docs and label
            # them with the in-development core version. (The app package is
            # ignored by changesets, so its own version goes stale.)
            LABEL="v$(jq -r .version packages/routecraft/package.json)"
            FREEZE_TAG=""
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "freeze_tag=$FREEZE_TAG" >> "$GITHUB_OUTPUT"
          echo "Docs version label: $LABEL"
          echo "Freeze docs to tag: ${FREEZE_TAG:-<none, using working tree>}"

      # Snapshot the in-development docs (the /docs/next channel) from the
      # checked out (main) content *before* the freeze below overlays /docs with
      # the released tag. The build then runs with SKIP_DOCS_NEXT so prebuild
      # does not regenerate next from the now-frozen /docs.
      - name: Generate the next docs channel
        run: node --experimental-strip-types apps/routecraft.dev/scripts/generate-docs-next.mjs

      - name: Freeze docs and cheat-sheet to the released ref
        if: steps.docver.outputs.freeze_tag != ''
        env:
          FREEZE_TAG: ${{ steps.docver.outputs.freeze_tag }}
        run: |
          set -eo pipefail
          app=apps/routecraft.dev/src/app
          # The generated next channel is untracked, so checking out the tag's
          # docs path leaves src/app/docs/next intact.
          git checkout "$FREEZE_TAG" -- "$app/docs" "$app/cheat-sheet"
          # The changelog moved to a top-level /changelog on the main cadence.
          # Older release refs still carry it under docs/changelog, so drop that
          # copy and restore the main-branch redirect stub at the old URL.
          rm -rf "$app/docs/changelog"
          git checkout HEAD -- "$app/docs/changelog"

      - name: Build docs
        env:
          NEXT_PUBLIC_DOC_VERSION: ${{ steps.docver.outputs.label }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          # next was snapshotted above from main; do not overwrite it from the
          # frozen /docs during prebuild.
          SKIP_DOCS_NEXT: "1"
        run: bun run --filter routecraft.dev build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/routecraft.dev/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
