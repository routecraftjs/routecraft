name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"
  pull_request_target:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".cursor/**"
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'examples/**'
              - 'bun.lock'
              - 'tsconfig*.json'
              - '.github/workflows/**'
              - '.github/scripts/**'
            docs:
              - 'apps/routecraft.dev/**'
              - '.github/workflows/**'

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Checkout PR branch for lockfile update
        if: ${{ github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update lockfile
        if: ${{ github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' }}
        run: |
          bun install

      - name: Commit lockfile changes
        if: ${{ github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bun.lock
          if git diff --cached --quiet; then
            echo "No lockfile changes needed"
          else
            git commit --amend --no-edit
            git push --force-with-lease
          fi

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

  validate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Run checks
        run: |
          bun run format
          bun run typecheck
          bun run lint
          bunx madge --circular .

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Run tests
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Build packages
        run: bun run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      - name: Check bundle size
        run: bun run limit:size

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

  integration-test:
    needs: [changes, validate, test, build]
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
    name: integration-test (${{ matrix.runtime }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set version for smoke test
        run: |
          VERSION=$(node -p "require('./packages/routecraft/package.json').version")
          bun run version:set "$VERSION"

      - name: Run scaffolder integration tests (bun)
        if: matrix.runtime == 'bun'
        env:
          TEST_PACKAGE_MANAGER: bun
        run: bun run test:integration

      - name: Run scaffolder integration tests (npm, install + typecheck only)
        if: matrix.runtime == 'bun'
        env:
          TEST_PACKAGE_MANAGER: npm
        run: bun run test:integration

      - name: Smoke test Node embedding (pack + npm install + node runner.ts)
        if: matrix.runtime == 'node'
        run: node .github/scripts/smoke-test-embedding.mjs

      - name: Restore repo (only paths set-version touched)
        run: |
          git checkout -- package.json examples/package.json \
            packages/ai/package.json packages/browser/package.json packages/cli/package.json \
            packages/create-routecraft/package.json packages/eslint-plugin-routecraft/package.json packages/os/package.json packages/routecraft/package.json packages/testing/package.json \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            packages/cli/src/index.ts \
            apps/routecraft.dev/package.json

  publish-canary:
    needs: [changes, build, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-canary-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Determine canary version
        id: canary_version
        run: |
          set -eo pipefail

          BASE_VERSION=$(node -p "require('./packages/routecraft/package.json').version")
          echo "Base version: $BASE_VERSION"

          # Query npm for the highest canary build number for this base version
          LATEST_CANARY=$(npm view @routecraft/routecraft versions --json 2>/dev/null | \
            jq -r ".[] | select(startswith(\"${BASE_VERSION}-canary.\"))" | \
            sed -n "s/^${BASE_VERSION}-canary\.\([0-9]*\)$/\1/p" | \
            sort -nr | head -n1)

          if [[ -n "$LATEST_CANARY" ]]; then
            BUILD_NUMBER=$((LATEST_CANARY + 1))
            echo "Latest canary build: $LATEST_CANARY, next: $BUILD_NUMBER"
          else
            BUILD_NUMBER=1
            echo "No canary found for $BASE_VERSION, starting at 1"
          fi

          CANARY_VERSION="${BASE_VERSION}-canary.${BUILD_NUMBER}"
          echo "Computed canary version: $CANARY_VERSION"

          {
            echo "canary_version=$CANARY_VERSION"
            echo "base_version=$BASE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Update package versions
        run: bun run version:set "${{ steps.canary_version.outputs.canary_version }}"

      - name: Publish canary to npm
        run: |
          for pkg in packages/routecraft packages/cli packages/create-routecraft packages/eslint-plugin-routecraft packages/ai packages/browser packages/testing; do
            echo "Publishing $pkg..."
            npm publish "./$pkg" --tag canary --access public --provenance
          done

  approve:
    name: approve
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' && !failure() && !cancelled()
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE'
            })

  merge:
    name: merge
    runs-on: ubuntu-latest
    needs: [approve]
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' && success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            })

  publish:
    needs: [build, integration-test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Validate release name matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"
          if [ "$TAG" != "$NAME" ]; then
            echo "::error::Release name ('$NAME') does not match tag ('$TAG'). They must be identical."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: "**/dist"
          key: build-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Update package versions
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/tags/v}
          bun run version:set "$RELEASE_VERSION"

      - name: Check package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Package version ($PKG_VERSION) does not match release version ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Publish packages to npm
        run: |
          for pkg in packages/routecraft packages/cli packages/create-routecraft packages/eslint-plugin-routecraft packages/ai packages/browser packages/testing; do
            echo "Publishing $pkg..."
            npm publish "./$pkg" --access public --provenance
          done

  build-docs-site:
    needs: [changes, validate, test, build]
    if: |
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'release'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (canary)
        uses: actions/checkout@v6
        with:
          path: canary
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.sha || 'refs/heads/main' }}

      - name: Record canary commit
        id: canary_commit
        working-directory: canary
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: canary/.nvmrc

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: canary/package.json

      - name: Install canary dependencies
        working-directory: canary
        run: bun install --frozen-lockfile

      - name: Build canary docs (/next)
        working-directory: canary
        env:
          NEXT_PUBLIC_BASE_PATH: /next
          NEXT_PUBLIC_DOC_VERSION: next
          NEXT_PUBLIC_DOC_COMMIT: ${{ steps.canary_commit.outputs.sha }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
        run: bun run --filter routecraft.dev build

      - name: Find latest stable tag
        id: latest
        working-directory: canary
        run: |
          set -eo pipefail
          if LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null); then
            echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "version=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "Latest stable tag: $LATEST_TAG"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No stable tag found; deploying canary only"
          fi

      - name: Checkout stable tag
        if: steps.latest.outputs.tag != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.latest.outputs.tag }}
          path: stable

      - name: Install stable dependencies
        if: steps.latest.outputs.tag != ''
        working-directory: stable
        run: bun install --frozen-lockfile

      - name: Set stable version metadata
        if: steps.latest.outputs.tag != ''
        working-directory: stable
        run: bun run version:set "${{ steps.latest.outputs.version }}"

      - name: Build stable docs (root)
        if: steps.latest.outputs.tag != ''
        working-directory: stable
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_DOC_VERSION: v${{ steps.latest.outputs.version }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
        run: bun run --filter routecraft.dev build

      - name: Assemble merged site
        env:
          STABLE_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          set -eo pipefail

          if [ -d stable/apps/routecraft.dev/out ]; then
            # Stable serves at root; canary serves at /next/
            mv stable/apps/routecraft.dev/out site
            mv canary/apps/routecraft.dev/out site/next
            cat > site/versions.json <<JSON
          [
            { "label": "next", "basePath": "/next" },
            { "label": "v${STABLE_VERSION}", "basePath": "", "default": true }
          ]
          JSON
          else
            # No stable tag yet: canary serves at root, no /next/
            mv canary/apps/routecraft.dev/out site
            cat > site/versions.json <<'JSON'
          [
            { "label": "next", "basePath": "", "default": true }
          ]
          JSON
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    needs: [changes, build-docs-site]
    if: |
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'release'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      id-token: write
      pages: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
