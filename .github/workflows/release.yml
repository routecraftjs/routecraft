name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # Push the v* core tag and let the action create GitHub Releases.
      contents: write
      # Open/update the "Version Packages" PR.
      pull-requests: write
      # npm provenance attestation.
      id-token: write
      # Re-run the CI workflow (docs deploy) after the v* tag lands.
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version-packages
          publish: bun run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      # The docs freeze logic in ci.yml keys off v* tags (core version), while
      # changesets tags per package (@routecraft/routecraft@x.y.z). Mirror the
      # core version as a v* tag whenever core was part of a publish.
      - name: Push core version tag
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -eo pipefail
          CORE_VERSION=$(echo "$PUBLISHED" | jq -r '.[] | select(.name == "@routecraft/routecraft") | .version')
          if [ -n "$CORE_VERSION" ]; then
            git tag "v$CORE_VERSION"
            git push origin "v$CORE_VERSION"
            echo "Pushed tag v$CORE_VERSION"
          else
            echo "Core package was not published in this run; no v* tag."
          fi

      # The CI docs deploy that ran for this same push raced the tag above and
      # froze /docs against the previous release. Re-dispatch it so the site
      # picks up the fresh tag.
      - name: Redeploy docs against the new release tag
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run CI --ref main
